<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Dewmini Pathirana</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Great+Vibes&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">Dewmini</a>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="projects.html">Experience</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </div>
    </nav>

    <main class="contact-main">
        <div class="container">
            <h1>Get in <span class="highlight">Touch</span></h1>

            <!-- NEWSLETTER SECTION -->
            <section class="newsletter">
                <h2>Subscribe to My Newsletter</h2>
                <form class="newsletter-form" method="post" action="#">
                    <div class="form-group">
                        <label for="news-name">Full Name</label>
                        <input type="text" id="news-name" name="fullName" required>
                    </div>
                    <div class="form-group">
                        <label for="news-email">Email Address</label>
                        <input type="email" id="news-email" name="email" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Subscribe</button>
                </form>
            </section>

            <!-- CONTACT FORM SECTION -->
            <section class="contact-form-section">
                <h2>Send Me a Message</h2>
                <form class="contact-form" method="post" action="#">
                    <div class="form-group">
                        <label for="contact-name">Name</label>
                        <input type="text" id="contact-name" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="contact-email">Email</label>
                        <input type="email" id="contact-email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="subject">Subject</label>
                        <input type="text" id="subject" name="subject" required>
                    </div>
                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="5" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Send Message</button>
                </form>
            </section>

            <!-- CONTACT INFO -->
            <section class="contact-info">
                <h2>Contact <span class="highlight">Information</span></h2>
                <div class="info-items">
                    <article class="info-item">
                        <h3>Email</h3>
                        <p><a href="mailto:dewminipathirana04@gmail.com">dewminipathirana04@gmail.com</a></p>
                    </article>
                    <article class="info-item">
                        <h3>LinkedIn</h3>
                        <p><a href="https://www.linkedin.com/in/dewmini-pathirana-28558a332/" target="_blank">Dewmini
                                Pathirana</a></p>
                    </article>
                    <article class="info-item">
                        <h3>GitHub</h3>
                        <p><a href="https://github.com/Dewmini24" target="_blank">Dewmini24</a></p>
                    </article>
                </div>
            </section>
        </div>
    </main>

    </footer>

</html>
